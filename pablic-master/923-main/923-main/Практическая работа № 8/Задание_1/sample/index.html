<!DOCTYPE html>
<html lang="ru">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Программирование на языке PHP</title>
</head>	
<body>

	<h1>Отправка данных на сервер</h1>
	<h2>Отправка форм</h2>

	<!-- Изменено на метод POST для безопасности личных данных -->
	<form action="server.php" method="post">
		<div>
			<label>Фамилия: <input type="text" name="surname" required></label>
		</div><br>
		<div>
			<label>Имя: <input type="text" name="name" required></label>
		</div><br>
		<div>
			<label>Отчество: <input type="text" name="patronymic"></label>
		</div><br>
		<div>
			<label>Должность: <input type="text" name="position"></label>
		</div><br>
		
		<div>
			<label for="education">Уровень образования:</label> 
			<select name="education_level" id="education">
				<option value="bachelor">Высшее (бакалавриат)</option>
				<!-- Исправлена потенциальная опечатка magnet -> master -->
				<option value="specialist_master">Высшее (специалитет, магистратура)</option>
				<option value="training">Подготовка кадров высшей квалификации</option>
				<option value="secondary_professional">Среднее профессиональное</option>
			</select>
		</div><br>
		
		<div>
			<span>Категория:</span> <br>
			<!-- Теперь клик по тексту активирует нужную радио-кнопку -->
			<label><input type="radio" name="category" value="higher"> Высшая</label><br>
			<label><input type="radio" name="category" value="first"> Первая</label><br>
			<label><input type="radio" name="category" value="matching"> Соответствие занимаемой должности</label>
		</div><br>
		
		<div>
			<label>Общий стаж: <input type="number" name="total_experience" step="0.1" min="0"></label>
		</div><br>
		
		<div>
			<label>Стаж в техникуме: <input type="number" name="technical_experience" step="0.1" min="0"></label>
		</div><br>	
		
		<button type="submit">Отправить</button>
	</form>

</body>
</html>
